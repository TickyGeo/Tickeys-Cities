<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tickeys' Cities</title>
    <link rel="shortcut icon" href="../img/logo.png">
    <link rel="stylesheet" href="../style.css">
</head>

<body>

    <div class="game lvl1">
        <div class="display">
            <h2>Guess the city!</h2>
            <img src="../img/first.webp" alt="img">
            <br>
            <div class="banner"></div>
        </div>
        <div class="point">
            <div class="block">0</div>
            <span>Point</span>
        </div>
        <div class="letter y">Y</div>
        <div class="letter e1">E</div>
        <div class="letter r">R</div>
        <div class="letter e2">E</div>
        <div class="letter v">V</div>
        <div class="letter a">A</div>
        <div class="letter n">N</div>
        <a href="room2.html" class="next">
            <img src="../img/next.png" alt="img">
        </a>
    </div>

    <script>
        const letters = document.querySelectorAll('.game.lvl1 .letter');
        const banner = document.querySelector('.game .display .banner');
        const point = document.querySelector('.game .point .block');
        const next = document.querySelector('.game .next');
        const soundTrue = new Audio('../audio/true.wav');
        const soundWrong = new Audio('../audio/wrong.wav');

        letters[0].onclick = () => {
            if (banner.innerText == '') {
                banner.innerText += letters[0].innerText;
                letters[0].style.display = 'none';
                soundTrue.play();
            };
        };

        letters[1].onclick = () => {
            if (banner.innerText == 'Y' || banner.innerText == 'YER') {
                banner.innerText += letters[1].innerText;
                letters[1].style.display = 'none';
                soundTrue.play();
            } else {
                soundWrong.play();
            };
        };

        letters[2].onclick = () => {
            if (banner.innerText == 'YE') {
                banner.innerText += letters[2].innerText;
                letters[2].style.display = 'none';
                soundTrue.play();
            } else {
                soundWrong.play();
            };
        };

        letters[3].onclick = () => {
            if (banner.innerText == 'YER' || banner.innerText == "Y") {
                banner.innerText += letters[3].innerText;
                letters[3].style.display = 'none';
                soundTrue.play();
            } else {
                soundWrong.play();
            };
        };

        letters[4].onclick = () => {
            if (banner.innerText == 'YERE') {
                banner.innerText += letters[4].innerText;
                letters[4].style.display = 'none';
                soundTrue.play();
            } else {
                soundWrong.play();
            };
        };

        letters[5].onclick = () => {
            if (banner.innerText == 'YEREV') {
                banner.innerText += letters[5].innerText;
                letters[5].style.display = 'none';
                soundTrue.play();
            } else {
                soundWrong.play();
            };
        };

        letters[6].onclick = () => {
            if (banner.innerText == 'YEREVA') {
                banner.innerText += letters[6].innerText;
                letters[6].style.display = 'none';
                point.innerText++;
                next.style.left = '50%';
                soundTrue.play();
            } else {
                soundWrong.play();
            };
        };

    </script>
</body>

</html>
