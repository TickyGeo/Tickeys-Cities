<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tickeys' Cities</title>
    <link rel="shortcut icon" href="../img/logo.png">
    <link rel="stylesheet" href="../style.css">
</head>

<body>

    <div class="game lvl6">
        <div class="display">
            <h2>Guess the city!</h2>
            <img src="../img/sixth.jpg" alt="img">
            <br>
            <div class="banner"></div>
        </div>
        <div class="point">
            <div class="block">5</div>
            <span>Point</span>
        </div>
        <div class="letter t">T</div>
        <div class="letter o1">O</div>
        <div class="letter k">K</div>
        <div class="letter y">Y</div>
        <div class="lock">
            <img src="../img/lock.png" alt="img">
        </div>
        <div class="question">
            <h4>Toyota is from&nbsp;</h4>
            <input type="text" class="input" maxlength="5">
        </div>
        <div class="letter o2">O</div>
        <div class="letter d">D</div>
        <div class="letter a">A</div>
        <div class="letter r">R</div>
        <div class="letter e">E</div>
        <div class="letter m">M</div>
        <img src="../img/sakura.png" alt="img" class="sakura">
        <a href="room7.html" class="next">
            <img src="../img/next.png" alt="img">
        </a>
    </div>

    <script>
        const letters = document.querySelectorAll('.game.lvl6  .letter');
        const banner = document.querySelector('.game .display .banner');
        const point = document.querySelector('.game .point .block');
        const next = document.querySelector('.game .next');
        const lock = document.querySelector('.game.lvl6  .lock');
        const question = document.querySelector('.game.lvl6 .question');
        const input = document.querySelector('.game.lvl6 .question .input');
        const sakura = document.querySelector('.game.lvl6 .sakura');
        const soundTrue = new Audio('../audio/true.wav');
        const soundWrong = new Audio('../audio/wrong.wav');
        const soundListwa = new Audio('../audio/listwa.mp3')

        let lockBool = false;
        let sakuraBool = false;

        letters[0].onclick = () => {
            if (banner.innerText == '') {
                banner.innerText += letters[0].innerText;
                letters[0].style.display = 'none';
                soundTrue.play();
            };
        };

        letters[1].onclick = () => {
            if (banner.innerText == 'T') {
                banner.innerText += letters[1].innerText;
                letters[1].style.display = 'none';
                letters[9].style.display = 'block';
                soundTrue.play();
            } else {
                soundWrong.play();
            };
        };

        letters[2].onclick = () => {
            if (banner.innerText == 'TO') {
                banner.innerText += letters[2].innerText;
                letters[2].style.display = 'none';
                lockBool = true;
                soundTrue.play();
            } else {
                soundWrong.play();
            };
        };

        letters[3].onclick = () => {
            if (banner.innerText == 'TOK') {
                banner.innerText += letters[3].innerText;
                letters[3].style.display = 'none';
                sakuraBool = true;
                soundTrue.play();
            } else {
                soundWrong.play();
            };
        };

        letters[4].onclick = () => {
            if (banner.innerText == 'TOKY') {
                banner.innerText += letters[4].innerText;
                letters[4].style.display = 'none';
                point.innerText++;
                soundTrue.play();
                next.style.left = '50%';

            } else {
                soundWrong.play();
            };
        };

        letters[5].onclick = () => soundWrong.play();

        letters[6].onclick = () => soundWrong.play();

        letters[7].onclick = () => soundWrong.play();

        letters[8].onclick = () => soundWrong.play();

        letters[9].onclick = () => soundWrong.play();

        lock.onclick = () => {
            if (lockBool) {
                question.style = 'opacity: 1; pointer-events: auto; bottom: 20%;';
            } else {
                soundWrong.play();
            };
        };

        input.oninput = () => {
            if (input.value == "Japan") {
                soundTrue.play();
                input.style.borderColor = 'green';
                lock.style.bottom = '-150px';           
                lock.ontransitionend = () => {
                    question.style.display = 'none'; 
                };     
            } else {
                input.style.borderColor = 'red';
            };
        };

        sakura.onclick = () => {
            if (sakuraBool) {
                letters[4].style.display = 'block';
                sakura.style.display = 'none';
                soundListwa.play();
                soundListwa.currentTime = 0.3;
            };
        };

    </script>
</body>

</html>
