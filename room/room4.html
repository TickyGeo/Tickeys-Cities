<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tickeys' Cities</title>
    <link rel="shortcut icon" href="../img/logo.png">
    <link rel="stylesheet" href="../style.css">
</head>

<body>

    <div class="game lvl4">
        <div class="display">
            <h2>Guess the city!</h2>
            <img src="../img/fourth.jpg" alt="img">
            <br>
            <div class="banner"></div>
        </div>
        <div class="point">
            <div class="block">3</div>
            <span>Point</span>
        </div>
        <div class="letter m">M</div>
        <div class="letter o1">O</div>
        <div class="letter s">S</div>
        <div class="letter c">C</div>
        <div class="letter o2">O</div>
        <div class="letter w">W</div>
        <div class="letter p">P</div>
        <div class="letter e">E</div>
        <div class="letter g">G</div>
        <a href="room5.html" class="next">
            <img src="../img/next.png" alt="img">
        </a>
    </div>

    <script>
        const letters = document.querySelectorAll('.game.lvl4 .letter');
        const banner = document.querySelector('.game .display .banner');
        const point = document.querySelector('.game .point .block');
        const next = document.querySelector('.game .next');
        const soundTrue = new Audio('../audio/true.wav');
        const soundWrong = new Audio('../audio/wrong.wav');

        letters[0].onclick = () => {
            if (banner.innerText == '') {
                banner.innerText += letters[0].innerText;
                letters[0].style.display = 'none';
                soundTrue.play();
            };
        };

        letters[1].onclick = () => {
            if (banner.innerText == 'M') {
                banner.innerText += letters[1].innerText;
                letters[1].style.display = 'none';
                soundTrue.play();
            } else {
                soundWrong.play();
            };
        };

        letters[2].onclick = () => {
            if (banner.innerText == 'MO') {
                banner.innerText += letters[2].innerText;
                letters[2].style.display = 'none';
                soundTrue.play();
            } else {
                soundWrong.play();
            };
        };

        letters[3].onclick = () => {
            if (banner.innerText == 'MOS') {
                banner.innerText += letters[3].innerText;
                letters[3].style.display = 'none';
                letters[4].style.display = 'block';
                soundTrue.play();
            } else {
                soundWrong.play();
            };
        };

        letters[4].onclick = () => {
            if (banner.innerText == 'MOSC') {
                banner.innerText += letters[4].innerText;
                letters[4].style.display = 'none';
                soundTrue.play();
            } else {
                soundWrong.play();
            };
        };

        letters[5].onclick = () => {
            if (banner.innerText == 'MOSCO') {
                banner.innerText += letters[5].innerText;
                letters[5].style.display = 'none';
                soundTrue.play();
                point.innerText++;
                next.style.left = '50%';
            } else {
                soundWrong.play();
            };
        };

        letters[6].onclick = () => soundWrong.play();

        letters[7].onclick = () => soundWrong.play();

        letters[8].onclick = () => soundWrong.play();
        
    </script>
</body>

</html>
