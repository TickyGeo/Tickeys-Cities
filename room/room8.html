<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tickeys' Cities</title>
    <link rel="shortcut icon" href="../img/logo.png">
    <link rel="stylesheet" href="../style.css">
</head>

<body>

    <div class="game lvl8">
        <div class="display">
            <h2>Guess the city!</h2>
            <img src="../img/eighth.jpg" alt="img">
            <br>
            <div class="banner"></div>
        </div>
        <div class="point">
            <div class="block">7</div>
            <span>Point</span>
        </div>
        <div class="letter k">K</div>
        <div class="letter a1">A</div>
        <div class="letter z">Z</div>
        <div class="lock1">
            <img src="../img/lock.png" alt="img">
        </div>
        <div class="question1">
            <h4 class="text1">Is Tatarstan located in Europe?&nbsp;</h4>
            <input type="text" class="input1">
        </div>
        <div class="letter a2">A</div>
        <div class="letter n">N</div>
        <div class="letter o">O</div>
        <div class="letter s">S</div>
        <div class="letter m">M</div>
        <div class="lock2">
            <img src="../img/lock.png" alt="img">
        </div>
        <div class="question2">
            <h4 class="text2">The most popular football club from Kazan&nbsp;</h4>
            <input type="text" class="input2">
        </div>
        <img src="../img/bars.png" alt="img" class="bars">
        <h2 class="winner">You Win</h2>
        <a href="../index.html" class="back">Menu</a>
    </div>

    <script>
        const letters = document.querySelectorAll('.game.lvl8  .letter');
        const banner = document.querySelector('.game .display .banner');
        const point = document.querySelector('.game .point .block');
        const lock1 = document.querySelector('.game.lvl8  .lock1');
        const question1 = document.querySelector('.game.lvl8 .question1');
        const input2 = document.querySelector('.game.lvl8 .question2 .input2');
        const lock2 = document.querySelector('.game.lvl8  .lock2');
        const question2 = document.querySelector('.game.lvl8 .question2');
        const input1 = document.querySelector('.game.lvl8 .question1 .input1');
        const bars = document.querySelector('.game.lvl8 .bars');
        const winner = document.querySelector('.game .winner');
        const back = document.querySelector('.game .back');
        const soundTrue = new Audio('../audio/true.wav');
        const soundWrong = new Audio('../audio/wrong.wav');
        const soundBars = new Audio('../audio/bars.mp3');

        let barsBool = false;
        let lock1Bool = false;
        let lock2Bool = false;

        letters[0].onclick = () => {
            if (banner.innerText == '') {
                banner.innerText += letters[0].innerText;
                letters[0].style.display = 'none';
                soundTrue.play();
                lock1Bool = true;
            };
        };

        letters[1].onclick = () => {
            if (banner.innerText == 'K') {
                banner.innerText += letters[1].innerText;
                letters[1].style.display = 'none';
                letters[3].style.display = 'block';
                barsBool = true;
                soundTrue.play();
            } else {
                soundWrong.play();
            };
        };

        letters[2].onclick = () => {
            if (banner.innerText == 'KA') {
                banner.innerText += letters[2].innerText;
                letters[2].style.display = 'none';
                soundTrue.play();
            } else {
                soundWrong.play();
            };
        };

        letters[3].onclick = () => {
            if (banner.innerText == 'KAZ') {
                banner.innerText += letters[3].innerText;
                letters[3].style.display = 'none';
                letters[5].style.display = 'block';
                lock2Bool = true;
                soundTrue.play();
            } else {
                soundWrong.play();
            };
        };


        letters[4].onclick = () => {
            if (banner.innerText == 'KAZA') {
                banner.innerText += letters[4].innerText;
                letters[4].style.display = 'none';
                winner.style = 'bottom: 20%; opacity: 1;';
                back.style = 'bottom: 5%; opacity: 1; pointer-events: auto;';
                point.innerText++;
                soundTrue.play();
                next.style.left = '50%';

            } else {
                soundWrong.play();
            };
        };

        letters[5].onclick = () => soundWrong.play();

        letters[6].onclick = () => soundWrong.play();

        letters[7].onclick = () => soundWrong.play();

        lock1.onclick = () => {
            if (lock1Bool) {
                question1.style = 'opacity: 1; pointer-events: auto; bottom: 20%;';
            } else {
                soundWrong.play();
            };
        };

        input1.oninput = () => {
            if (input1.value == "yes" || input1.value == "Yes") {
                soundTrue.play();
                input1.style.borderColor = 'green';
                lock1.style.bottom = '-150px';
                question1.style.left = '-700px';

            } else {
                input1.style.borderColor = 'red';
            };
        };

        lock2.onclick = () => {
            if (lock2Bool) {
                question2.style = 'opacity: 1; pointer-events: auto; bottom: 20%;';
            } else {
                soundWrong.play();
            };
        };

        input2.oninput = () => {
            if (input2.value == "Rubin") {
                soundTrue.play();
                input2.style.borderColor = 'green';
                lock2.style.bottom = '-150px';
                question2.style.left = '-700px';

            } else {
                input2.style.borderColor = 'red';
            };
        };


        bars.onclick = () => {
            if (barsBool) {
                letters[2].style.display = 'block';
                bars.style.display = 'none';
                soundBars.play();
                soundBars.currentTime = 1;
            };
        };

    </script>
</body>

</html>
